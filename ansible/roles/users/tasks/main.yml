---
# =============================================================================
# TASKS — Role: users
# Cria grupos e usuários com as configurações corretas
# =============================================================================

# ---------------------------------------------------------------------------
# ETAPA 1: Garantir que o rbash (restricted bash) existe
# O rbash é um shell com funcionalidades limitadas, ideal para convidados
# ---------------------------------------------------------------------------
- name: Verificar se rbash está disponível
  stat:
    path: /bin/rbash
  register: rbash_stat

- name: Criar link simbólico para rbash se não existir
  file:
    src: /bin/bash
    dest: /bin/rbash
    state: link
  when: not rbash_stat.stat.exists

# ---------------------------------------------------------------------------
# ETAPA 2: Criar os grupos do sistema
# ---------------------------------------------------------------------------
- name: Criar grupos corporativos
  group:
    name: "{{ item.name }}"
    gid: "{{ item.gid }}"
    state: present
  loop: "{{ grupos }}"
  loop_control:
    label: "{{ item.name }} (GID: {{ item.gid }})"

# ---------------------------------------------------------------------------
# ETAPA 3: Hash de senha (SHA-512)
# O filtro password_hash() roda na MÁQUINA DE CONTROLE (seu WSL), não no
# container remoto — por isso não instalamos nada aqui. O pacote python3
# com suporte a passlib já vem junto com o pacote "ansible" (não "ansible-core")
# instalado no WSL. Se você usa ansible-core sozinho, instale no WSL com:
#   sudo apt install -y python3-passlib
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# ETAPA 4: Criar usuários com senhas hasheadas
# O filtro password_hash gera um hash SHA-512 seguro
# ---------------------------------------------------------------------------
- name: Criar usuários corporativos
  user:
    name: "{{ item.name }}"
    uid: "{{ item.uid }}"
    group: "{{ item.group }}"
    groups: "{{ item.groups | join(',') }}"
    password: "{{ item.password | password_hash('sha512') }}"
    shell: "{{ item.shell }}"
    comment: "{{ item.comment }}"
    create_home: "{{ item.create_home }}"
    state: present
  loop: "{{ usuarios }}"
  loop_control:
    label: "{{ item.name }} → grupo: {{ item.group }}"

# ---------------------------------------------------------------------------
# ETAPA 5: Garantir que usuários podem fazer login via SSH com senha
# ---------------------------------------------------------------------------
- name: Configurar SSH para permitir autenticação por senha
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^PasswordAuthentication"
    line: "PasswordAuthentication yes"
    state: present
  notify: Reiniciar SSH

