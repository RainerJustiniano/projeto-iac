version: '3.8'

# =============================================================================
# AVISO IMPORTANTE
# Este arquivo funciona com Docker Engine real + "docker compose" (plugin v2).
# Se você está usando Podman no WSL (caso mais comum neste projeto, por causa
# de espaço em disco), NÃO use este arquivo — use "bash setup.sh" na raiz do
# projeto. O "podman-compose" tem um bug conhecido (versão 1.0.6) que força
# a flag --ip em todas as redes de um container simultaneamente, o que é
# inválido e quebra qualquer container com mais de uma rede.
# Ver: README.md → seção "Como Executar"
# =============================================================================

networks:
  admin_net:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 192.168.10.0/24
          gateway: 192.168.10.1

  work_net:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 192.168.20.0/24
          gateway: 192.168.20.1

  data_net:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 192.168.30.0/24
          gateway: 192.168.30.1

services:

  dns:
    build:
      context: ./containers/dns
    container_name: dns
    hostname: dns.lab
    networks:
      admin_net:
        ipv4_address: 192.168.10.2
      work_net:
        ipv4_address: 192.168.20.2
    restart: unless-stopped

  adminsrv:
    build:
      context: ./containers/base
    container_name: adminsrv
    hostname: adminsrv.lab
    dns: 192.168.10.2
    networks:
      admin_net:
        ipv4_address: 192.168.10.10
      data_net:
        ipv4_address: 192.168.30.10
    ports:
      - "2210:22"
    depends_on:
      - dns
    restart: unless-stopped

  worksrv:
    build:
      context: ./containers/base
    container_name: worksrv
    hostname: worksrv.lab
    dns: 192.168.20.2
    networks:
      work_net:
        ipv4_address: 192.168.20.10
      data_net:
        ipv4_address: 192.168.30.20
    ports:
      - "2220:22"
    depends_on:
      - dns
    restart: unless-stopped

  datastore:
    build:
      context: ./containers/base
    container_name: datastore
    hostname: datastore.lab
    networks:
      data_net:
        ipv4_address: 192.168.30.30
    ports:
      - "2230:22"
    restart: unless-stopped

  client:
    build:
      context: ./containers/base
    container_name: client
    hostname: client.lab
    dns: 192.168.10.2
    networks:
      admin_net:
        ipv4_address: 192.168.10.100
      work_net:
        ipv4_address: 192.168.20.100
    ports:
      - "2240:22"
    depends_on:
      - dns
      - adminsrv
      - worksrv
    restart: unless-stopped
